name: expense_tracker
description: A modern, offline-first expense tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  csv: ^6.0.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  crypto: ^3.0.3
  flutter_sms_inbox: ^1.0.1
  permission_handler: ^11.3.1
  workmanager: ^0.9.0
  uuid: ^4.4.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^5.0.2
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/icon/icon.jpeg"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
